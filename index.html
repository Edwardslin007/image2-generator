<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Generator - gpt-image-2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        header p {
            color: #888;
            font-size: 0.95rem;
        }

        .input-section {
            background: #141414;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .input-section label {
            display: block;
            font-size: 0.85rem;
            color: #999;
            margin-bottom: 8px;
            font-weight: 500;
        }

        textarea {
            width: 100%;
            height: 120px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            color: #e0e0e0;
            padding: 14px;
            font-size: 0.95rem;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
            font-family: inherit;
        }

        textarea:focus {
            border-color: #667eea;
        }

        .options {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .options label {
            margin-bottom: 0;
        }

        .options select {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #e0e0e0;
            padding: 8px 12px;
            font-size: 0.9rem;
            outline: none;
            cursor: pointer;
        }

        .options select:focus {
            border-color: #667eea;
        }

        .btn-generate {
            display: block;
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        .btn-generate:hover { opacity: 0.9; }
        .btn-generate:active { transform: scale(0.98); }
        .btn-generate:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .result-section {
            text-align: center;
            min-height: 200px;
        }

        .loading {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            padding: 60px 0;
        }

        .loading.active { display: flex; }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #333;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading p { color: #888; font-size: 0.9rem; }

        .image-result {
            display: none;
            margin-top: 8px;
        }

        .image-result.active { display: block; }

        .image-result img {
            max-width: 100%;
            border-radius: 12px;
            border: 1px solid #2a2a2a;
        }

        .image-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 16px;
        }

        .btn-action {
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: #e0e0e0;
            font-size: 0.9rem;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .btn-action:hover { border-color: #667eea; }

        .error {
            display: none;
            background: #2a1515;
            border: 1px solid #5a2020;
            border-radius: 10px;
            padding: 16px;
            margin-top: 16px;
            color: #ff6b6b;
            font-size: 0.9rem;
            text-align: left;
        }

        .error.active { display: block; }

        .preset-prompts {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .preset-btn {
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid #333;
            background: transparent;
            color: #aaa;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .preset-btn:hover {
            border-color: #667eea;
            color: #667eea;
        }

        footer {
            text-align: center;
            margin-top: 60px;
            padding: 20px;
            color: #555;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>AI Image Generator</h1>
            <p>Powered by gpt-image-2</p>
        </header>

        <div class="input-section">
            <label for="prompt">Prompt</label>
            <textarea id="prompt" placeholder="Describe the image you want to generate..."></textarea>

            <div class="preset-prompts">
                <button class="preset-btn" onclick="setPreset('A minimalist poster for agricultural products, natural tones of green and yellow, clean layout')">农产品海报</button>
                <button class="preset-btn" onclick="setPreset('A futuristic cityscape at sunset, cyberpunk style, neon lights, highly detailed')">赛博朋克城市</button>
                <button class="preset-btn" onclick="setPreset('A cute cat astronaut floating in space, digital art, vibrant colors')">太空猫咪</button>
                <button class="preset-btn" onclick="setPreset('Traditional Chinese ink painting of mountains and water, serene, elegant')">中国水墨画</button>
            </div>

            <div class="options">
                <div>
                    <label for="size">Size</label>
                    <select id="size">
                        <option value="1024x1024">1024x1024 (1:1)</option>
                        <option value="1024x1792" selected>1024x1792 (9:16)</option>
                        <option value="1792x1024">1792x1024 (16:9)</option>
                    </select>
                </div>
            </div>

            <button class="btn-generate" id="btnGenerate" onclick="generate()">Generate</button>
        </div>

        <div class="result-section">
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Generating image, please wait...</p>
            </div>

            <div class="image-result" id="imageResult">
                <img id="resultImage" src="" alt="Generated image">
                <div class="image-actions">
                    <button class="btn-action" onclick="downloadImage()">Download</button>
                    <button class="btn-action" onclick="copyImageUrl()">Copy URL</button>
                </div>
            </div>

            <div class="error" id="error"></div>
        </div>

        <footer>
            API Key is exposed in client-side code. For production use, deploy with a backend proxy.
        </footer>
    </div>

    <script>
        const API_KEY = "sk-af901a02722e771b17623f78735c021d14b66bdccb6b70a40db6e75d1116805b";
        const BASE_URL = "https://2030.wujixian.fun";
        const MODEL = "gpt-image-2";

        let currentBlobUrl = null;

        function setPreset(text) {
            document.getElementById('prompt').value = text;
        }

        async function generate() {
            const prompt = document.getElementById('prompt').value.trim();
            const size = document.getElementById('size').value;

            if (!prompt) {
                showError('Please enter a prompt.');
                return;
            }

            const btn = document.getElementById('btnGenerate');
            const loading = document.getElementById('loading');
            const result = document.getElementById('imageResult');
            const error = document.getElementById('error');

            btn.disabled = true;
            btn.textContent = 'Generating...';
            loading.classList.add('active');
            result.classList.remove('active');
            error.classList.remove('active');

            try {
                const resp = await fetch(`${BASE_URL}/v1/images/generations`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        model: MODEL,
                        prompt: prompt,
                        n: 1,
                        size: size,
                        response_format: 'b64_json',
                    }),
                });

                if (!resp.ok) {
                    const errText = await resp.text();
                    throw new Error(`API error ${resp.status}: ${errText.slice(0, 300)}`);
                }

                const data = await resp.json();
                const images = data.data || [];

                if (!images.length) {
                    throw new Error('No image data returned from API.');
                }

                let imgSrc;
                if (images[0].b64_json) {
                    imgSrc = `data:image/png;base64,${images[0].b64_json}`;
                } else if (images[0].url) {
                    imgSrc = images[0].url;
                } else {
                    throw new Error('Unexpected response format.');
                }

                currentBlobUrl = imgSrc;
                document.getElementById('resultImage').src = imgSrc;
                result.classList.add('active');

            } catch (e) {
                showError(e.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Generate';
                loading.classList.remove('active');
            }
        }

        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = msg;
            el.classList.add('active');
        }

        function downloadImage() {
            if (!currentBlobUrl) return;
            const a = document.createElement('a');
            a.href = currentBlobUrl;
            a.download = `generated_${Date.now()}.png`;
            a.click();
        }

        function copyImageUrl() {
            if (!currentBlobUrl) return;
            navigator.clipboard.writeText(currentBlobUrl).then(() => {
                alert('Image data URL copied to clipboard.');
            });
        }

        // Allow Ctrl+Enter to generate
        document.getElementById('prompt').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                generate();
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Generator - gpt-image-2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        header p {
            color: #888;
            font-size: 0.95rem;
        }

        .input-section {
            background: #141414;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .input-section label {
            display: block;
            font-size: 0.85rem;
            color: #999;
            margin-bottom: 8px;
            font-weight: 500;
        }

        textarea {
            width: 100%;
            height: 120px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            color: #e0e0e0;
            padding: 14px;
            font-size: 0.95rem;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
            font-family: inherit;
        }

        textarea:focus {
            border-color: #667eea;
        }

        .options {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .options label {
            margin-bottom: 0;
        }

        .options select {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #e0e0e0;
            padding: 8px 12px;
            font-size: 0.9rem;
            outline: none;
            cursor: pointer;
        }

        .options select:focus {
            border-color: #667eea;
        }

        .btn-generate {
            display: block;
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        .btn-generate:hover { opacity: 0.9; }
        .btn-generate:active { transform: scale(0.98); }
        .btn-generate:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .result-section {
            text-align: center;
            min-height: 200px;
        }

        .loading {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            padding: 60px 0;
        }

        .loading.active { display: flex; }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #333;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading p { color: #888; font-size: 0.9rem; }

        .image-result {
            display: none;
            margin-top: 8px;
        }

        .image-result.active { display: block; }

        .image-result img {
            max-width: 100%;
            border-radius: 12px;
            border: 1px solid #2a2a2a;
        }

        .image-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 16px;
        }

        .btn-action {
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: #e0e0e0;
            font-size: 0.9rem;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .btn-action:hover { border-color: #667eea; }

        .error {
            display: none;
            background: #2a1515;
            border: 1px solid #5a2020;
            border-radius: 10px;
            padding: 16px;
            margin-top: 16px;
            color: #ff6b6b;
            font-size: 0.9rem;
            text-align: left;
        }

        .error.active { display: block; }

        .preset-prompts {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .preset-btn {
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid #333;
            background: transparent;
            color: #aaa;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .preset-btn:hover {
            border-color: #667eea;
            color: #667eea;
        }

        /* 参考图上传 */
        .ref-section {
            margin-top: 20px;
            border: 1px dashed #333;
            border-radius: 12px;
            padding: 14px;
            background: #131313;
        }
        .ref-section .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .ref-section .row label {
            margin: 0;
            color: #aaa;
        }
        .ref-section .hint {
            font-size: 0.75rem;
            color: #666;
        }
        .ref-pick {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 6px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: #ddd;
            font-size: 0.82rem;
            cursor: pointer;
        }
        .ref-pick:hover { border-color: #667eea; }
        .ref-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        .ref-item {
            position: relative;
            width: 84px;
            height: 84px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #2a2a2a;
        }
        .ref-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .ref-item .rm {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: rgba(0,0,0,0.7);
            color: #fff;
            border: none;
            font-size: 14px;
            line-height: 18px;
            cursor: pointer;
        }

        footer {
            text-align: center;
            margin-top: 60px;
            padding: 20px;
            color: #555;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>AI Image Generator</h1>
            <p>Powered by gpt-image-2</p>
        </header>

        <div class="input-section">
            <label for="prompt">Prompt</label>
            <textarea id="prompt" placeholder="Describe the image you want to generate..."></textarea>

            <div class="preset-prompts">
                <button class="preset-btn" onclick="setPreset('A minimalist poster for agricultural products, natural tones of green and yellow, clean layout')">农产品海报</button>
                <button class="preset-btn" onclick="setPreset('A futuristic cityscape at sunset, cyberpunk style, neon lights, highly detailed')">赛博朋克城市</button>
                <button class="preset-btn" onclick="setPreset('A cute cat astronaut floating in space, digital art, vibrant colors')">太空猫咪</button>
                <button class="preset-btn" onclick="setPreset('Traditional Chinese ink painting of mountains and water, serene, elegant')">中国水墨画</button>
            </div>

            <div class="options">
                <div>
                    <label for="size">Size</label>
                    <select id="size">
                        <option value="1024x1024">1024x1024 (1:1)</option>
                        <option value="1024x1792" selected>1024x1792 (9:16)</option>
                        <option value="1792x1024">1792x1024 (16:9)</option>
                    </select>
                </div>
            </div>

            <div class="ref-section">
                <div class="row">
                    <label>参考图（可选，可多张）</label>
                    <div>
                        <label class="ref-pick" for="refInput">+ 添加图片</label>
                        <input id="refInput" type="file" accept="image/*" multiple style="display:none">
                    </div>
                </div>
                <div class="hint">不带参考图 = 文生图（1k）；带参考图 = 图生图/编辑（自动 2k）。可多张融合。</div>
                <div class="ref-list" id="refList"></div>
            </div>

            <button class="btn-generate" id="btnGenerate" onclick="generate()">Generate</button>
        </div>

        <div class="result-section">
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Generating image, please wait...</p>
            </div>

            <div class="image-result" id="imageResult">
                <img id="resultImage" src="" alt="Generated image">
                <div class="image-actions">
                    <button class="btn-action" onclick="downloadImage()">Download</button>
                    <button class="btn-action" onclick="copyImageUrl()">Copy URL</button>
                </div>
            </div>

            <div class="error" id="error"></div>
        </div>

        <footer>
            API Key is secured in Cloudflare Worker. Powered by gpt-image-2.
        </footer>
    </div>

    <script>
        // ===================== CONFIG =====================
        // 本地开发：留空 = 同源（serve.py 起的 http://127.0.0.1:8765/）
        // 部署到 Cloudflare Worker 时改成 worker URL，例如：
        // const API_BASE = "https://image2-proxy.edwardslin1130.workers.dev";
        const API_BASE = "";
        // ==================================================

        const MODEL = "gpt-image-2"; // 当前启用：opus5 提供
        // const MODEL = "gpt-image-2"; // 旧的，保留备用

        let currentImageUrl = null;     // 远端 ossdown.com 图片 URL
        let currentDownloadUrl = null;  // 实际给 <img>/下载用的 URL（走代理）

        // ====== 参考图 ======
        const refImages = []; // { name, dataUrl }

        function renderRefList() {
            const box = document.getElementById('refList');
            box.innerHTML = '';
            refImages.forEach((it, i) => {
                const div = document.createElement('div');
                div.className = 'ref-item';
                div.innerHTML = `<img src="${it.dataUrl}" alt=""><button class="rm" title="移除">×</button>`;
                div.querySelector('.rm').onclick = () => {
                    refImages.splice(i, 1);
                    renderRefList();
                };
                box.appendChild(div);
            });
        }

        document.getElementById('refInput').addEventListener('change', (e) => {
            const files = Array.from(e.target.files || []);
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    refImages.push({ name: file.name, dataUrl: ev.target.result });
                    renderRefList();
                };
                reader.readAsDataURL(file);
            });
            e.target.value = '';
        });

        function setPreset(text) {
            document.getElementById('prompt').value = text;
        }

        async function generate() {
            const prompt = document.getElementById('prompt').value.trim();
            const size = document.getElementById('size').value;

            if (!prompt) {
                showError('Please enter a prompt.');
                return;
            }

            const btn = document.getElementById('btnGenerate');
            const loading = document.getElementById('loading');
            const result = document.getElementById('imageResult');
            const error = document.getElementById('error');

            btn.disabled = true;
            btn.textContent = 'Generating...';
            loading.classList.add('active');
            result.classList.remove('active');
            error.classList.remove('active');

            const t0 = Date.now();
            const tick = setInterval(() => {
                const sec = Math.floor((Date.now() - t0) / 1000);
                document.querySelector('#loading p').textContent =
                    `Generating image... ${sec}s${refImages.length ? ` (${refImages.length} 张参考图)` : ''}`;
            }, 1000);

            try {
                // 构造 vision 风格 messages
                // 注意：opus5 这家不支持 size 字段，提示词里也不要带 [size:]，会让上游报 bad_response_status_code
                const content = [{ type: 'text', text: prompt }];
                refImages.forEach(it => {
                    content.push({ type: 'image_url', image_url: { url: it.dataUrl } });
                });

                const resp = await fetch(`${API_BASE}/v1/chat/completions`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: MODEL,
                        messages: [{ role: 'user', content }],
                    }),
                });

                if (!resp.ok) {
                    const errText = await resp.text();
                    throw new Error(`API error ${resp.status}: ${errText.slice(0, 400)}`);
                }

                const data = await resp.json();

                // 这家返回 chat.completion 格式，URL 在 message.content 的 markdown 里
                let imgUrl = null;
                const choices = data.choices || [];
                if (choices.length) {
                    const text = (choices[0].message || {}).content || '';
                    const m = text.match(/!\[[^\]]*\]\((https?:\/\/[^)\s]+)\)/);
                    if (m) imgUrl = m[1];
                }
                // 兼容旧格式（如果有人切回 /v1/images/generations）
                if (!imgUrl && Array.isArray(data.data) && data.data[0]) {
                    if (data.data[0].url) imgUrl = data.data[0].url;
                    else if (data.data[0].b64_json) {
                        imgUrl = `data:image/png;base64,${data.data[0].b64_json}`;
                    }
                }

                if (!imgUrl) {
                    throw new Error('未能从响应中解析出图片 URL：' + JSON.stringify(data).slice(0, 400));
                }

                currentImageUrl = imgUrl;
                // 通过本地代理加载，绕开图床的 UA / CORS 限制
                currentDownloadUrl = imgUrl.startsWith('data:')
                    ? imgUrl
                    : `${API_BASE}/proxy/img?url=${encodeURIComponent(imgUrl)}`;

                document.getElementById('resultImage').src = currentDownloadUrl;
                result.classList.add('active');

            } catch (e) {
                showError(e.message);
            } finally {
                clearInterval(tick);
                btn.disabled = false;
                btn.textContent = 'Generate';
                loading.classList.remove('active');
            }
        }

        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = msg;
            el.classList.add('active');
        }

        async function downloadImage() {
            if (!currentDownloadUrl) return;
            try {
                const r = await fetch(currentDownloadUrl);
                const blob = await r.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `generated_${Date.now()}.png`;
                a.click();
                setTimeout(() => URL.revokeObjectURL(url), 5000);
            } catch (e) {
                showError('下载失败: ' + e.message);
            }
        }

        function copyImageUrl() {
            if (!currentImageUrl) return;
            navigator.clipboard.writeText(currentImageUrl).then(() => {
                alert('原始图片 URL 已复制到剪贴板');
            });
        }

        // Allow Ctrl+Enter to generate
        document.getElementById('prompt').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                generate();
            }
        });
    </script>
</body>
</html>
